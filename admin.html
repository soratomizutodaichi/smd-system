<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理画面 | 空と水と大地合同会社</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #F8F9FA; color: #333; }
header { background: #1A5276; color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
header h1 { font-size: 18px; }
.logout-btn { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
.container { max-width: 1300px; margin: 0 auto; padding: 24px 16px; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: #fff; border-radius: 10px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.stat-num { font-size: 32px; font-weight: 900; color: #2E86C1; }
.stat-label { font-size: 13px; color: #666; margin-top: 4px; }
.filter-bar { background: #fff; border-radius: 10px; padding: 16px 20px; margin-bottom: 16px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.filter-bar select, .filter-bar input { padding: 8px 12px; border: 1.5px solid #E9ECEF; border-radius: 6px; font-size: 14px; }
.trash-toggle { padding: 8px 16px; border: 1.5px solid #E74C3C; border-radius: 6px; font-size: 14px; cursor: pointer; background: #fff; color: #E74C3C; font-weight: 600; transition: all 0.2s; }
.trash-toggle.active { background: #E74C3C; color: #fff; }
.table-wrap { background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th { background: #1A5276; color: #fff; padding: 12px 14px; text-align: left; white-space: nowrap; }
.trash-mode th { background: #7B241C; }
td { padding: 12px 14px; border-bottom: 1px solid #F0F0F0; vertical-align: top; }
tr:hover { background: #F8FBFF; }
tr.deleted-row { background: #FEF9F9; }
tr.deleted-row:hover { background: #FDEDEC; }
.badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
.badge-meeting { background: #D6EAF8; color: #1A5276; }
.badge-inquiry { background: #D5F5E3; color: #1E8449; }
.check-btn { width: 22px; height: 22px; cursor: pointer; accent-color: #2E86C1; }
.date-input { padding: 6px 10px; border: 1.5px solid #E9ECEF; border-radius: 6px; font-size: 13px; width: 140px; }
.time-select { padding: 6px 8px; border: 1.5px solid #E9ECEF; border-radius: 6px; font-size: 13px; width: 100px; margin-top: 4px; }
.save-btn { padding: 6px 14px; background: #2E86C1; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; margin-top: 4px; }
.save-btn:hover { background: #1A5276; }
.soft-del-btn { padding: 6px 12px; background: #fff; color: #E74C3C; border: 1.5px solid #E74C3C; border-radius: 6px; cursor: pointer; font-size: 12px; white-space: nowrap; }
.soft-del-btn:hover { background: #FDEDEC; }
.restore-btn { padding: 6px 12px; background: #fff; color: #2E86C1; border: 1.5px solid #2E86C1; border-radius: 6px; cursor: pointer; font-size: 12px; white-space: nowrap; margin-bottom: 6px; }
.restore-btn:hover { background: #EBF5FB; }
.hard-del-btn { padding: 6px 12px; background: #E74C3C; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; white-space: nowrap; }
.hard-del-btn:hover { background: #C0392B; }
.trash-banner { background: #FDEDEC; border: 1.5px solid #E74C3C; border-radius: 8px; padding: 10px 16px; margin-bottom: 12px; font-size: 14px; color: #7B241C; font-weight: 600; }
.login-overlay { position: fixed; inset: 0; background: #0d1b2a; display: flex; align-items: center; justify-content: center; z-index: 999; }
.login-box { background: #fff; border-radius: 16px; padding: 48px 40px; width: 360px; text-align: center; }
.login-box h2 { font-size: 22px; margin-bottom: 8px; color: #1A5276; }
.login-box p { font-size: 14px; color: #666; margin-bottom: 24px; }
.login-box input { width: 100%; padding: 12px 16px; border: 1.5px solid #E9ECEF; border-radius: 8px; font-size: 15px; margin-bottom: 16px; }
.login-box button { width: 100%; padding: 14px; background: #2E86C1; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; }
.login-error { color: #E74C3C; font-size: 13px; margin-top: 8px; display: none; }
.called-yes { color: #1E8449; font-weight: 700; }
.called-no { color: #E74C3C; }
.contract-send-btn { padding: 7px 12px; background: #1E8449; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; white-space: nowrap; }
.contract-send-btn:hover { background: #196F3D; }
.contract-confirm-btn { padding: 7px 12px; background: #2E86C1; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; white-space: nowrap; margin-top: 4px; }
.contract-confirm-btn:hover { background: #1A5276; }
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>管理画面ログイン</h2>
    <p>空と水と大地合同会社<br>システムサービス部門</p>
    <input type="email" id="emailInput" placeholder="メールアドレス" onkeydown="if(event.key==='Enter')checkLogin()">
    <input type="password" id="passwordInput" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')checkLogin()">
    <button onclick="checkLogin()" id="loginBtn">ログイン</button>
    <div class="login-error" id="loginError">メールアドレスまたはパスワードが違います</div>
  </div>
</div>

<header>
  <h1>📋 面談予約・お問い合わせ 管理画面</h1>
  <button class="logout-btn" onclick="logout()">ログアウト</button>
</header>

<div class="container">
  <div class="stats">
    <div class="stat-card"><div class="stat-num" id="totalCount">0</div><div class="stat-label">総件数</div></div>
    <div class="stat-card"><div class="stat-num" id="meetingCount">0</div><div class="stat-label">面談予約</div></div>
    <div class="stat-card"><div class="stat-num" id="inquiryCount">0</div><div class="stat-label">お問い合わせ</div></div>
    <div class="stat-card"><div class="stat-num" id="calledCount">0</div><div class="stat-label">電話済み</div></div>
    <div class="stat-card"><div class="stat-num" id="pendingCount">0</div><div class="stat-label">未対応</div></div>
    <div class="stat-card"><div class="stat-num" id="deletedCount" style="color:#E74C3C;">0</div><div class="stat-label">ゴミ箱</div></div>
  </div>

  <div class="filter-bar">
    <label style="font-size:14px;font-weight:600;">絞り込み：</label>
    <select id="filterType" onchange="renderTable()">
      <option value="">全て</option>
      <option value="meeting">面談予約</option>
      <option value="inquiry">お問い合わせ</option>
    </select>
    <select id="filterCalled" onchange="renderTable()">
      <option value="">全て</option>
      <option value="false">未対応</option>
      <option value="true">電話済み</option>
    </select>
    <input type="text" id="filterName" placeholder="名前で検索..." oninput="renderTable()" style="width:180px;">
    <button class="trash-toggle" id="trashToggle" onclick="toggleTrash()">🗑 ゴミ箱を表示</button>
  </div>

  <div id="trashBanner" class="trash-banner" style="display:none;">🗑 ゴミ箱表示中 — 仮想削除されたデータです。復元または完全削除ができます。</div>

  <div class="table-wrap" id="tableWrap">
    <table id="mainTable">
      <thead id="tableHead">
        <tr>
          <th>受付日時／種別／お名前／会社名</th>
          <th>電話番号／メール／第1希望／第2希望</th>
          <th>サービス／内容</th>
          <th>電話済み</th>
          <th>面談確定日</th>
          <th>契約状況（実施予定日含む）</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
emailjs.init({publicKey: 'sydEkxfsmryplEbcO'});
const SUPABASE_URL = 'https://gcmtnzvcoovjqxanbmqc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdjbXRuenZjb292anF4YW5ibXFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NDczNTksImV4cCI6MjA5MzAyMzM1OX0.30xm_Vd7UdfkombPOfSjg-nYxmuwYlnHHEgqRzWE4fQ';
var sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
var allData = [];
var showTrash = false;

async function checkLogin() {
  var email = document.getElementById('emailInput').value;
  var pw = document.getElementById('passwordInput').value;
  var btn = document.getElementById('loginBtn');
  btn.textContent = 'ログイン中...';
  btn.disabled = true;
  var { data, error } = await sbClient.auth.signInWithPassword({ email: email, password: pw });
  if (error) {
    document.getElementById('loginError').style.display = 'block';
    btn.textContent = 'ログイン';
    btn.disabled = false;
  } else {
    document.getElementById('loginOverlay').style.display = 'none';
    loadData();
  }
}

async function logout() {
  await sbClient.auth.signOut();
  location.reload();
}

window.onload = async function() {
  var { data } = await sbClient.auth.getSession();
  if (data.session) {
    document.getElementById('loginOverlay').style.display = 'none';
    loadData();
  }
};

async function loadData() {
  var { data, error } = await sbClient.from('aisys_form_submissions').select('*').order('created_at', { ascending: false });
  if (error) { alert('データ取得エラー: ' + error.message); return; }
  allData = data || [];
  updateStats();
  renderTable();
}

function updateStats() {
  var active = allData.filter(function(r){ return !r.deleted_at; });
  var deleted = allData.filter(function(r){ return r.deleted_at; });
  var meetings = active.filter(function(r){ return r.type === 'meeting'; });
  var inquiries = active.filter(function(r){ return r.type === 'inquiry'; });
  var called = active.filter(function(r){ return r.called; });
  var pending = active.filter(function(r){ return !r.called; });
  document.getElementById('totalCount').textContent = active.length;
  document.getElementById('meetingCount').textContent = meetings.length;
  document.getElementById('inquiryCount').textContent = inquiries.length;
  document.getElementById('calledCount').textContent = called.length;
  document.getElementById('pendingCount').textContent = pending.length;
  document.getElementById('deletedCount').textContent = deleted.length;
}

function toggleTrash() {
  showTrash = !showTrash;
  var btn = document.getElementById('trashToggle');
  var banner = document.getElementById('trashBanner');
  if (showTrash) {
    btn.classList.add('active');
    btn.textContent = '✅ ゴミ箱表示中';
    banner.style.display = 'block';
    document.getElementById('filterCalled').disabled = true;
    document.getElementById('filterType').disabled = true;
  } else {
    btn.classList.remove('active');
    btn.textContent = '🗑 ゴミ箱を表示';
    banner.style.display = 'none';
    document.getElementById('filterCalled').disabled = false;
    document.getElementById('filterType').disabled = false;
  }
  renderTable();
}

function renderTable() {
  var filterType = document.getElementById('filterType').value;
  var filterCalled = document.getElementById('filterCalled').value;
  var filterName = document.getElementById('filterName').value.toLowerCase();

  var filtered = allData.filter(function(r) {
    if (showTrash) return !!r.deleted_at;
    if (r.deleted_at) return false;
    if (filterType && r.type !== filterType) return false;
    if (filterCalled !== '' && String(r.called) !== filterCalled) return false;
    if (filterName && !(r.name||'').toLowerCase().includes(filterName)) return false;
    return true;
  });

  var table = document.getElementById('mainTable');
  if (showTrash) {
    table.classList.add('trash-mode');
  } else {
    table.classList.remove('trash-mode');
  }

  var html = '';
  filtered.forEach(function(r) {
    var dt = r.created_at ? new Date(r.created_at).toLocaleString('ja-JP') : '';
    var badge = r.type === 'meeting' ? '<span class="badge badge-meeting">面談予約</span>' : '<span class="badge badge-inquiry">問い合わせ</span>';
    var confirmUrl = 'https://aisys.soratomizutodaichi.com/confirmation.html?id=' + r.id;
    var rowClass = showTrash ? ' class="deleted-row"' : '';

    html += '<tr' + rowClass + '>';
    html += '<td style="font-size:12px;color:#000;white-space:nowrap;">' +
      dt + '<br>' + badge + '<br>' +
      '<strong>' + (r.name||'') + '</strong><br>' +
      '<span style="color:#555;">' + (r.company||'―') + '</span>';
    if (!showTrash) html += '<br><a href="' + confirmUrl + '" target="_blank" style="font-size:11px;color:#2E86C1;">確認ページ</a>';
    html += '</td>';
    html += '<td style="font-size:12px;color:#000;">' +
      (r.phone||'') + '<br>' +
      (r.email||'') + '<br>' +
      '<span style="color:#444;">第1：</span>' + (r.preferred_date_1||'―') + '<br>' +
      '<span style="color:#444;">第2：</span>' + (r.preferred_date_2||'―') +
      '</td>';
    html += '<td style="font-size:12px;max-width:160px;color:#000;"><strong>' + (r.plan||'') + '</strong><br>' + (r.message||'') + '</td>';

    if (showTrash) {
      var delDt = r.deleted_at ? new Date(r.deleted_at).toLocaleString('ja-JP') : '';
      html += '<td colspan="3" style="font-size:12px;color:#999;">削除日時：' + delDt + '</td>';
      html += '<td><button class="restore-btn" onclick="restoreRow(\'' + r.id + '\')">↩ 復元</button><br><button class="hard-del-btn" onclick="hardDelete(\'' + r.id + '\')">🗑 完全削除</button></td>';
    } else {
      var calledClass = r.called ? 'called-yes' : 'called-no';
      var calledText = r.called ? '✅ 済' : '❌ 未';
      html += '<td style="text-align:center;"><span class="' + calledClass + '">' + calledText + '</span><br><input type="checkbox" class="check-btn" ' + (r.called ? 'checked' : '') + ' onchange="updateCalled(\'' + r.id + '\', this.checked)"></td>';
      var cdParts = parseConfirmedDate(r.confirmed_date);
      html += '<td>';
      html += '<input type="date" class="date-input" value="' + cdParts.date + '" id="cd_date_' + r.id + '">';
      html += '<br><select class="time-select" id="cd_time_' + r.id + '">' + buildTimeOptions(cdParts.time) + '</select>';
      html += '<br><button class="save-btn" onclick="saveDate(\'' + r.id + '\')">保存</button>';
      html += '</td>';
      html += '<td>' + renderContractStatus(r) + '</td>';
      html += '<td><button class="soft-del-btn" onclick="softDelete(\'' + r.id + '\')">🗑 削除</button></td>';
    }
    html += '</tr>';
  });

  document.getElementById('tableBody').innerHTML = html || '<tr><td colspan="7" style="text-align:center;padding:32px;color:#999;">データがありません</td></tr>';
}

async function softDelete(id) {
  if (!confirm('このデータをゴミ箱に移しますか？\n（後から復元できます）')) return;
  var now = new Date().toISOString();
  var { error } = await sbClient.from('aisys_form_submissions').update({ deleted_at: now }).eq('id', id);
  if (error) { alert('エラー: ' + error.message); return; }
  var item = allData.find(function(r){ return r.id == id; });
  if (item) item.deleted_at = now;
  updateStats();
  renderTable();
}

async function restoreRow(id) {
  var { error } = await sbClient.from('aisys_form_submissions').update({ deleted_at: null }).eq('id', id);
  if (error) { alert('エラー: ' + error.message); return; }
  var item = allData.find(function(r){ return r.id == id; });
  if (item) item.deleted_at = null;
  updateStats();
  renderTable();
}

async function hardDelete(id) {
  if (!confirm('完全に削除します。この操作は取り消せません。\n本当に削除しますか？')) return;
  var { error } = await sbClient.from('aisys_form_submissions').delete().eq('id', id);
  if (error) { alert('エラー: ' + error.message); return; }
  allData = allData.filter(function(r){ return r.id != id; });
  updateStats();
  renderTable();
}

async function updateCalled(id, checked) {
  await sbClient.from('aisys_form_submissions').update({ called: checked }).eq('id', id);
  var item = allData.find(function(r){ return r.id == id; });
  if (item) item.called = checked;
  updateStats();
  renderTable();
}

function buildTimeOptions(selected) {
  var times = [];
  for (var h = 10; h <= 16; h++) {
    times.push(('0'+h).slice(-2) + ':00');
    if (h < 16) times.push(('0'+h).slice(-2) + ':30');
  }
  var html = '<option value="">時間を選択</option>';
  times.forEach(function(t) {
    html += '<option value="' + t + '"' + (t === selected ? ' selected' : '') + '>' + t + '</option>';
  });
  return html;
}

function parseConfirmedDate(val) {
  if (!val) return { date: '', time: '' };
  var parts = val.split(' ');
  return { date: parts[0] || '', time: parts[1] || '' };
}

function renderContractStatus(r) {
  var sdParts = parseConfirmedDate(r.service_date);
  var serviceDateHtml =
    '<div style="font-size:11px;font-weight:700;color:#1A5276;margin-bottom:4px;">実施予定日</div>' +
    '<input type="date" class="date-input" value="' + sdParts.date + '" id="sd_date_' + r.id + '" style="width:130px;">' +
    '<br><select class="time-select" id="sd_time_' + r.id + '">' + buildTimeOptions(sdParts.time) + '</select>' +
    '<br><button class="save-btn" onclick="saveServiceDate(\'' + r.id + '\')" style="margin-top:4px;">保存</button>' +
    '<hr style="margin:10px 0;border:none;border-top:1px solid #E9ECEF;">';

  if (r.company_confirmed_paid_at && r.applicant_paid_at) {
    return serviceDateHtml +
      '<div style="color:#1E8449;font-weight:700;font-size:13px;">✅ 契約完了</div>' +
      '<div style="font-size:11px;color:#666;">申込者：' + new Date(r.applicant_paid_at).toLocaleDateString('ja-JP') + '</div>' +
      '<div style="font-size:11px;color:#666;">会社側：' + new Date(r.company_confirmed_paid_at).toLocaleDateString('ja-JP') + '</div>';
  }
  if (r.contract_sent_at) {
    var sentDt = new Date(r.contract_sent_at).toLocaleString('ja-JP');
    var html = serviceDateHtml;
    html += '<div style="font-size:11px;color:#2E86C1;font-weight:700;margin-bottom:2px;">📄 送付済み</div>';
    html += '<div style="font-size:11px;color:#666;margin-bottom:6px;">' + sentDt + '</div>';
    html += '<div style="font-size:11px;margin-bottom:4px;">' + (r.applicant_paid_at ? '✅ 申込者：入金確認済み' : '⏳ 申込者：未確認') + '</div>';
    if (r.applicant_paid_at && !r.company_confirmed_paid_at) {
      html += '<button class="contract-confirm-btn" onclick="confirmPayment(\'' + r.id + '\')">✅ 入金確認済みにする</button>';
    } else if (r.company_confirmed_paid_at) {
      html += '<div style="font-size:11px;">✅ 会社側：確認済み</div>';
    } else {
      html += '<div style="font-size:11px;color:#999;">会社側：未確認</div>';
    }
    return html;
  }
  if (!r.confirmed_date) {
    return serviceDateHtml + '<div style="font-size:11px;color:#999;">面談確定日を先に設定してください</div>';
  }
  return serviceDateHtml + '<button class="contract-send-btn" onclick="sendContract(\'' + r.id + '\')">📄 契約書を送付する</button>';
}

async function saveServiceDate(id) {
  var dateVal = document.getElementById('sd_date_' + id).value;
  var timeVal = document.getElementById('sd_time_' + id).value;
  var val = (dateVal && timeVal) ? dateVal + ' ' + timeVal : (dateVal || timeVal || '');
  var { error } = await sbClient.from('aisys_form_submissions').update({ service_date: val }).eq('id', id);
  if (error) { alert('エラー: ' + error.message); return; }
  var item = allData.find(function(r){ return r.id == id; });
  if (item) item.service_date = val;
  alert('実施予定日を保存しました');
}

async function sendContract(id) {
  var item = allData.find(function(r){ return r.id == id; });
  if (!item) return;
  if (!item.confirmed_date) { alert('確定日程を先に入力・保存してください。'); return; }
  if (!confirm(item.name + ' 様に契約書を送付しますか？')) return;
  var contractUrl = 'https://aisys.soratomizutodaichi.com/contract.html?id=' + id;
  var now = new Date().toISOString();
  var { error } = await sbClient.from('aisys_form_submissions').update({ contract_url: contractUrl, contract_sent_at: now }).eq('id', id);
  if (error) { alert('エラー: ' + error.message); return; }
  try {
    await emailjs.send('service_7m0hycl', 'template_contract', {
      to_name: item.name,
      to_email: item.email,
      contract_url: contractUrl,
      plan: item.plan || '',
      confirmed_date: item.confirmed_date || '',
      service_date: item.service_date || '未定'
    });
  } catch(e) {
    alert('DBへの保存は完了しましたが、メール送信に失敗しました。\n契約書URL: ' + contractUrl);
  }
  item.contract_url = contractUrl;
  item.contract_sent_at = now;
  renderTable();
  alert('契約書を送付しました。');
}

async function confirmPayment(id) {
  if (!confirm('入金を確認しました。契約を完了としますか？')) return;
  var now = new Date().toISOString();
  var { error } = await sbClient.from('aisys_form_submissions').update({ company_confirmed_paid_at: now }).eq('id', id);
  if (error) { alert('エラー: ' + error.message); return; }
  var item = allData.find(function(r){ return r.id == id; });
  if (item) item.company_confirmed_paid_at = now;
  renderTable();
}

async function saveDate(id) {
  var dateVal = document.getElementById('cd_date_' + id).value;
  var timeVal = document.getElementById('cd_time_' + id).value;
  var val = (dateVal && timeVal) ? dateVal + ' ' + timeVal : (dateVal || timeVal || '');
  var { error } = await sbClient.from('aisys_form_submissions').update({ confirmed_date: val }).eq('id', id);
  if (error) { alert('エラー: ' + error.message); return; }
  var item = allData.find(function(r){ return r.id == id; });
  if (item) item.confirmed_date = val;
  if (val && item && item.email) {
    try {
      var confirmUrl = 'https://aisys.soratomizutodaichi.com/confirmation.html?id=' + id;
      await emailjs.send('service_7m0hycl', 'template_confirmed', {
        to_name: item.name,
        to_email: item.email,
        confirmed_date: val,
        confirmation_url: confirmUrl
      });
      alert('面談確定日を保存し、申込者にメールを送信しました。');
    } catch(e) {
      alert('保存しましたが、メール送信に失敗しました。\n' + (e.text || e));
    }
  } else {
    alert('面談確定日を保存しました。');
  }
}
</script>
