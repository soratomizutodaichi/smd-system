<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お申込み内容の確認 | 空と水と大地合同会社</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #F8F9FA; color: #333; min-height: 100vh; }
header { background: #1A5276; color: #fff; padding: 16px 24px; text-align: center; }
header h1 { font-size: 18px; }
header p { font-size: 13px; opacity: 0.8; margin-top: 4px; }
.container { max-width: 640px; margin: 40px auto; padding: 0 16px 60px; }
.card { background: #fff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; }
.card-header { background: linear-gradient(135deg, #2E86C1, #1ABC9C); color: #fff; padding: 28px 32px; }
.card-header h2 { font-size: 20px; margin-bottom: 6px; }
.card-header p { font-size: 14px; opacity: 0.9; }
.card-body { padding: 32px; }
.section-title { font-size: 13px; font-weight: 700; color: #2E86C1; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #EBF5FB; }
.info-row { display: flex; gap: 16px; margin-bottom: 14px; }
.info-label { min-width: 140px; font-size: 13px; color: #666; padding-top: 2px; }
.info-value { font-size: 15px; font-weight: 600; color: #333; flex: 1; }
.status-box { background: #EBF5FB; border-radius: 12px; padding: 20px 24px; margin-top: 24px; }
.status-title { font-size: 13px; font-weight: 700; color: #1A5276; margin-bottom: 12px; }
.status-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.status-icon { font-size: 20px; }
.status-text { font-size: 15px; }
.confirmed-date { background: #D5F5E3; border-radius: 8px; padding: 12px 16px; margin-top: 12px; font-size: 15px; font-weight: 700; color: #1E8449; }
.loading { text-align: center; padding: 60px; color: #999; font-size: 16px; }
.error { text-align: center; padding: 60px; color: #E74C3C; }
.badge { display: inline-block; padding: 4px 14px; border-radius: 999px; font-size: 13px; font-weight: 700; margin-bottom: 8px; }
.badge-meeting { background: rgba(255,255,255,0.25); color: #fff; }
.badge-inquiry { background: rgba(255,255,255,0.25); color: #fff; }
.note { font-size: 13px; color: #888; line-height: 1.7; margin-top: 24px; padding-top: 20px; border-top: 1px solid #F0F0F0; }
</style>
</head>
<body>

<header>
  <h1>空と水と大地合同会社 システムサービス部門</h1>
  <p>お申込み内容の確認ページ</p>
</header>

<div class="container">
  <div id="content" class="loading">読み込み中...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL = 'https://gcmtnzvcoovjqxanbmqc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdjbXRuenZjb292anF4YW5ibXFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NDczNTksImV4cCI6MjA5MzAyMzM1OX0.30xm_Vd7UdfkombPOfSjg-nYxmuwYlnHHEgqRzWE4fQ';
var sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

var params = new URLSearchParams(window.location.search);
var id = params.get('id');

async function loadData() {
  if (!id) {
    document.getElementById('content').innerHTML = '<div class="error">URLが正しくありません。</div>';
    return;
  }
  var { data, error } = await sbClient.from('aisys_form_submissions').select('*').eq('id', id).single();
  if (error || !data) {
    document.getElementById('content').innerHTML = '<div class="error">データが見つかりません。</div>';
    return;
  }
  var r = data;
  var isMeeting = r.type === 'meeting';
  var dt = r.created_at ? new Date(r.created_at).toLocaleString('ja-JP') : '';
  var badgeText = isMeeting ? '面談予約' : 'お問い合わせ';
  var calledHtml = r.confirmed_date
    ? ''
    : '<div class="status-row"><span class="status-icon">⏳</span><span class="status-text" style="color:#E67E22;">対応準備中（通常1〜3営業日以内にご連絡します）</span></div>';
  var confirmedHtml = r.confirmed_date
    ? '<div class="confirmed-date">📅 面談確定日程：' + r.confirmed_date + '</div>'
    : '';
  var contractHtml = '';
  if (r.contract_sent_at) {
    var contractUrl = r.contract_url || ('https://aisys.soratomizutodaichi.com/contract.html?id=' + r.id);
    if (r.company_confirmed_paid_at && r.applicant_paid_at) {
      var serviceDateHtml = r.service_date
        ? '<div style="margin-top:20px;background:#fff;border-radius:12px;padding:20px 24px;border:2px solid #1E8449;">' +
            '<div style="font-size:13px;font-weight:700;color:#1E8449;margin-bottom:8px;">🗓 サービス実施予定日時</div>' +
            '<div style="font-size:22px;font-weight:900;color:#1A5276;">' + r.service_date + '</div>' +
          '</div>'
        : '';
      contractHtml = '<div class="status-box" style="background:#D5F5E3;margin-top:16px;">' +
        '<div class="status-title" style="color:#1E8449;">✅ 契約完了</div>' +
        '<div style="font-size:14px;color:#1E8449;font-weight:600;">入金が確認され、契約が正式に完了しました。</div>' +
        serviceDateHtml +
        '</div>';
    } else {
      contractHtml = '<div class="status-box" style="background:#EBF5FB;margin-top:16px;">' +
        '<div class="status-title">📄 契約書</div>' +
        '<div style="margin-bottom:12px;font-size:14px;">契約書が届いています。内容をご確認ください。</div>' +
        '<a href="' + contractUrl + '" style="display:inline-block;padding:10px 24px;background:#1A5276;color:#fff;border-radius:8px;font-weight:700;font-size:14px;text-decoration:none;margin-bottom:8px;">📄 契約書を確認・印刷する</a>' +
        (r.applicant_paid_at
          ? '<div style="margin-top:8px;font-size:13px;color:#1E8449;font-weight:700;">✅ 入金確認を送信済みです。会社側の確認をお待ちください。</div>'
          : '') +
        '</div>';
    }
  }
  var dateHtml = isMeeting ? '<div class="info-row"><div class="info-label">ご希望日時（第1希望）</div><div class="info-value">' + (r.preferred_date_1||'未入力') + '</div></div><div class="info-row"><div class="info-label">ご希望日時（第2希望）</div><div class="info-value">' + (r.preferred_date_2||'未入力') + '</div></div>' : '';

  document.getElementById('content').innerHTML =
    '<div class="card">' +
      '<div class="card-header">' +
        '<span class="badge badge-' + r.type + '">' + badgeText + '</span>' +
        '<h2>' + (r.name||'') + ' 様のお申込み内容</h2>' +
        '<p>受付日時：' + dt + '</p>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="section-title">お客様情報</div>' +
        '<div class="info-row"><div class="info-label">お名前</div><div class="info-value">' + (r.name||'') + ' 様</div></div>' +
        '<div class="info-row"><div class="info-label">店舗・会社名</div><div class="info-value">' + (r.company||'―') + '</div></div>' +
        '<div class="info-row"><div class="info-label">電話番号</div><div class="info-value">' + (r.phone||'') + '</div></div>' +
        '<div class="info-row"><div class="info-label">メールアドレス</div><div class="info-value">' + (r.email||'') + '</div></div>' +
        (isMeeting ? '<div class="section-title" style="margin-top:24px;">ご希望日時</div>' + dateHtml + '<div class="info-row"><div class="info-label">関心のあるサービス</div><div class="info-value">' + (r.plan||'') + '</div></div>' : '') +
        '<div class="info-row" style="margin-top:8px;"><div class="info-label">内容・ご質問</div><div class="info-value">' + (r.message||'―') + '</div></div>' +
        '<div class="status-box">' +
          '<div class="status-title">📞 対応状況</div>' +
          calledHtml +
          confirmedHtml +
        '</div>' +
        contractHtml +
        '<div class="note">※ このページのURLはお客様専用です。第三者に共有しないようお願いします。<br>※ 対応状況は随時更新されます。ページを再読み込みすると最新の状況が確認できます。</div>' +
      '</div>' +
    '</div>';
}

loadData();
</script>
</body>
</html>
